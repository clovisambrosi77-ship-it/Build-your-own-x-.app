workflows:
  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      node: 18.16.0
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web app
        script: |
          npm run build

      - name: Add iOS platform
        script: |
          npm install -g @capacitor/cli
          npx cap add ios || echo "iOS platform already exists"

      - name: Sync iOS project
        script: |
          npx cap sync ios

      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install --repo-update

      - name: Build iOS app
        script: |
          cd ios/App
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -derivedDataPath build/

    artifacts:
      - ios/App/build/**/*.app
    publishing:
      email:
        recipients:
          - ${{ secrets.BUILD_EMAIL }}
        notify:
          success: true
          failure: true
